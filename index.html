<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>無雙深淵 英傑印記一覽</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animation">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>

    <div class="app-container">
        <header class="header">
            <h1 class="main-title">
                <span class="title-highlight">無雙深淵</span>
                英傑印記一覽
            </h1>
        </header>

        <main class="main-content">
            <section class="glass-panel options-section">
                <div class="options-group">
                    <label class="toggle-switch">
                        <input type="checkbox" id="toggle-altered">
                        <span class="slider"></span>
                        <span class="toggle-label">顯示(異化)英傑</span>
                    </label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="toggle-breakthrough" checked>
                        <span class="slider"></span>
                        <span class="toggle-label">使用突破印記進行篩選</span>
                    </label>
                </div>
            </section>

            <section class="glass-panel filter-section">
                <div class="filter-group">
                    <h2 class="filter-title">
                        <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                        印記 (屬性)
                    </h2>
                    <div class="sub-filter">
                        <div id="attribute-tags-1" class="tag-container"></div>
                    </div>
                    <div class="sub-filter">
                        <div id="attribute-tags-2" class="tag-container"></div>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="filter-group">
                    <h2 class="filter-title">
                        <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
                        印記 (特性)
                    </h2>
                    <div class="sub-filter">
                        <h4 class="sub-filter-title">三國</h4>
                        <div id="trait-tags-1" class="tag-container"></div>
                    </div>
                    <div class="sub-filter">
                        <h4 class="sub-filter-title">戰國</h4>
                        <div id="trait-tags-2" class="tag-container"></div>
                    </div>
                    <div class="sub-filter">
                        <h4 class="sub-filter-title">其他</h4>
                        <div id="trait-tags-3" class="tag-container"></div>
                    </div>
                </div>
            </section>

            <section class="results-section">
                <div class="results-header">
                    <h2 class="results-title">符合條件的英傑</h2>
                    <span id="results-count" class="badge">讀取中...</span>
                </div>
                
                <div id="hero-grid" class="hero-grid">
                    <!-- Hero cards generated by JS -->
                </div>
                
                <div id="empty-state" class="empty-state hidden">
                    <div class="empty-icon">😢</div>
                    <h3>找不到符合條件的英傑</h3>
                    <p>請嘗試減少篩選條件</p>
                    <button id="reset-btn" class="reset-btn">重置所有篩選</button>
                </div>
            </section>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
